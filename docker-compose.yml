services:
  postgres:
    image: bitnami/postgresql:latest
    container_name: bookreview-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bookreview
    ports:
      - "5432:5432"
    volumes:
      - ./bookreview-pgdata:/var/lib/postgresql/data

volumes:
  bookreview-pgdata:
    name: bookreview-pgdata
